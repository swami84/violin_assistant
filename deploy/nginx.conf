# Rate-limit zone: max 10 requests/min per IP (protects against brute-force on Basic Auth)
limit_req_zone $binary_remote_addr zone=violin_auth:10m rate=10r/m;

# Redirect all plain HTTP to HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;

    ssl_certificate     /etc/nginx/certs/violin/violin.crt;
    ssl_certificate_key /etc/nginx/certs/violin/violin.key;

    # Modern TLS only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "microphone=(self)" always;

    # Password protection
    auth_basic "Violin Trainer";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Apply rate limit to the whole site (burst allows normal browsing, blocks hammering)
    limit_req zone=violin_auth burst=20 nodelay;

    # Serve built React app
    root /var/www/violin_assistant;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* → FastAPI backend (strips /api prefix)
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 50M;    # allow large audio uploads
        proxy_read_timeout   120s;
    }
}
